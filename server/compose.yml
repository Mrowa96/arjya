services:
  arjya-server:
    image: mrowa96/arjya-server
    environment:
      - APP_HOSTNAME=0.0.0.0
      - APP_PORT=3000
      - APP_PUBLIC_URL=http://localhost:3000
    ports:
      - '127.0.0.1:3000:3000'
    restart: on-failure:3
    volumes:
      - './db:/app/db'
      - './data:/app/data'
      - './assets:/app/assets'
